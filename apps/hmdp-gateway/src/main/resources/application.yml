server:
  port: 8080

spring:
  application:
    name: hmdp-gateway
  data:
    redis:
      database: 0
      host: 127.0.0.1
      port: 6379
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: hmdp-auth-service
              uri: ${HMDP_AUTH_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/user/code,/user/login,/user/logout,/user/me
            - id: hmdp-user-service
              uri: ${HMDP_USER_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/user/info/**,/user/level/update,/user/sign,/user/sign/count,/user/{id}
            - id: hmdp-shop-service
              uri: ${HMDP_SHOP_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/shop/**,/shop-type/**
            - id: hmdp-blog-service
              uri: ${HMDP_BLOG_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/blog/**,/follow/**,/blog-comments/**
            - id: hmdp-voucher-service
              uri: ${HMDP_VOUCHER_SERVICE_URL:http://localhost:8085}
              predicates:
                - Path=/voucher/**,/voucher-order/seckill/**,/upload/**,/test/**
            - id: hmdp-order-service
              uri: ${HMDP_ORDER_SERVICE_URL:http://localhost:8086}
              predicates:
                - Path=/voucher-order/get/**,/voucher-order/cancel
            - id: hmdp-job-service
              uri: ${HMDP_JOB_SERVICE_URL:http://localhost:8088}
              predicates:
                - Path=/job/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

hmdp:
  gateway:
    auth:
      enabled: true
      login-user-key-prefix: "login:token:"
      token-ttl: 36000m
      whitelist:
        - /user/code
        - /user/login
        - /shop/**
        - /shop-type/**
        - /voucher/**
        - /blog/hot
        - /upload/**
        - /test/**
        - /actuator/**
        - /internal/**
