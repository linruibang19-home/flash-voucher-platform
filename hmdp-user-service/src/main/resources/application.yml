server:
  port: 8082

spring:
  application:
    name: hmdp-user-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/hmdp?useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true&allowMultiQueries=true&serverTimezone=Asia/Shanghai&autoReconnect=true
    username: root
    password: root
  data:
    redis:
      database: 0
      host: 127.0.0.1
      port: 6379

mybatis-plus:
  type-aliases-package: org.javaup.user.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    local-cache-scope: statement

management:
  endpoints:
    web:
      exposure:
        include: health,info
