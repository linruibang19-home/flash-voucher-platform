version: "3.9"

# 黑马点评 微服务 Docker Compose 部署（开发/测试环境）
# 依赖中间件：MySQL 8、Redis 7、Kafka（KRaft 模式）

services:

  # ─── 基础设施 ────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: hmdp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: hmdp
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: hmdp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: hmdp-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      retries: 5

  # ─── 业务服务 ────────────────────────────────────────────────
  hmdp-gateway:
    build:
      context: ..
      dockerfile: apps/hmdp-gateway/Dockerfile
    container_name: hmdp-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      HMDP_AUTH_SERVICE_URL: http://hmdp-auth-service:8081
      HMDP_USER_SERVICE_URL: http://hmdp-user-service:8082
      HMDP_SHOP_SERVICE_URL: http://hmdp-shop-service:8083
      HMDP_BLOG_SERVICE_URL: http://hmdp-blog-service:8084
      HMDP_VOUCHER_SERVICE_URL: http://hmdp-voucher-service:8085
      HMDP_ORDER_SERVICE_URL: http://hmdp-order-service:8086
      HMDP_JOB_SERVICE_URL: http://hmdp-job-service:8088
    depends_on:
      redis:
        condition: service_healthy

  hmdp-auth-service:
    build:
      context: ..
      dockerfile: services/hmdp-auth-service/Dockerfile
    container_name: hmdp-auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  hmdp-user-service:
    build:
      context: ..
      dockerfile: services/hmdp-user-service/Dockerfile
    container_name: hmdp-user-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  hmdp-shop-service:
    build:
      context: ..
      dockerfile: services/hmdp-shop-service/Dockerfile
    container_name: hmdp-shop-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  hmdp-blog-service:
    build:
      context: ..
      dockerfile: services/hmdp-blog-service/Dockerfile
    container_name: hmdp-blog-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRING_DATA_REDIS_HOST: redis
      HMDP_USER_SERVICE_URL: http://hmdp-user-service:8082
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  hmdp-voucher-service:
    build:
      context: ..
      dockerfile: services/hmdp-voucher-service/Dockerfile
    container_name: hmdp-voucher-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  hmdp-order-service:
    build:
      context: ..
      dockerfile: services/hmdp-order-service/Dockerfile
    container_name: hmdp-order-service
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      HMDP_VOUCHER_SERVICE_URL: http://hmdp-voucher-service:8085
      HMDP_NOTIFY_SERVICE_URL: http://hmdp-notify-service:8087
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  hmdp-notify-service:
    build:
      context: ..
      dockerfile: services/hmdp-notify-service/Dockerfile
    container_name: hmdp-notify-service
    ports:
      - "8087:8087"
    environment:
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      redis:
        condition: service_healthy

  hmdp-job-service:
    build:
      context: ..
      dockerfile: services/hmdp-job-service/Dockerfile
    container_name: hmdp-job-service
    ports:
      - "8088:8088"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      HMDP_VOUCHER_SERVICE_URL: http://hmdp-voucher-service:8085
      HMDP_ORDER_SERVICE_URL: http://hmdp-order-service:8086
    depends_on:
      redis:
        condition: service_healthy
      hmdp-voucher-service:
        condition: service_started
      hmdp-order-service:
        condition: service_started

volumes:
  mysql_data:
  redis_data:
