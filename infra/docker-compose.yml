services:

  # ─── 基础设施 ────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: hmdp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: hmdp
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: hmdp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    container_name: hmdp-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─── 可观测性 ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: hmdp-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - hmdp-voucher-service
      - hmdp-order-service
      - hmdp-notify-service
      - hmdp-job-service

  grafana:
    image: grafana/grafana:10.4.2
    container_name: hmdp-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # ─── 注册中心 ────────────────────────────────────────────────
  hmdp-registry:
    build:
      context: ..
      dockerfile: apps/hmdp-registry/Dockerfile
    container_name: hmdp-registry
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 8

  # ─── 业务服务 ────────────────────────────────────────────────
  hmdp-gateway:
    build:
      context: ..
      dockerfile: apps/hmdp-gateway/Dockerfile
    container_name: hmdp-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      # Gateway 静态路由仍使用容器内网地址
      HMDP_AUTH_SERVICE_URL: http://hmdp-auth-service:8081
      HMDP_USER_SERVICE_URL: http://hmdp-user-service:8082
      HMDP_SHOP_SERVICE_URL: http://hmdp-shop-service:8083
      HMDP_BLOG_SERVICE_URL: http://hmdp-blog-service:8084
      HMDP_VOUCHER_SERVICE_URL: http://hmdp-voucher-service:8085
      HMDP_ORDER_SERVICE_URL: http://hmdp-order-service:8086
      HMDP_JOB_SERVICE_URL: http://hmdp-job-service:8088
    depends_on:
      redis:
        condition: service_healthy
      hmdp-registry:
        condition: service_healthy

  hmdp-auth-service:
    build:
      context: ..
      dockerfile: services/hmdp-auth-service/Dockerfile
    container_name: hmdp-auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_SERVICE_URL: http://hmdp-registry:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      hmdp-registry:
        condition: service_healthy

  hmdp-user-service:
    build:
      context: ..
      dockerfile: services/hmdp-user-service/Dockerfile
    container_name: hmdp-user-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_SERVICE_URL: http://hmdp-registry:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      hmdp-registry:
        condition: service_healthy

  hmdp-shop-service:
    build:
      context: ..
      dockerfile: services/hmdp-shop-service/Dockerfile
    container_name: hmdp-shop-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_SERVICE_URL: http://hmdp-registry:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      hmdp-registry:
        condition: service_healthy

  hmdp-blog-service:
    build:
      context: ..
      dockerfile: services/hmdp-blog-service/Dockerfile
    container_name: hmdp-blog-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_SERVICE_URL: http://hmdp-registry:8761/eureka/
      # Feign 走 Eureka 服务发现，不设置 HMDP_USER_SERVICE_URL
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      hmdp-registry:
        condition: service_healthy

  hmdp-voucher-service:
    build:
      context: ..
      dockerfile: services/hmdp-voucher-service/Dockerfile
    container_name: hmdp-voucher-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_SERVICE_URL: http://hmdp-registry:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      hmdp-registry:
        condition: service_healthy

  hmdp-order-service:
    build:
      context: ..
      dockerfile: services/hmdp-order-service/Dockerfile
    container_name: hmdp-order-service
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hmdp?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_SERVICE_URL: http://hmdp-registry:8761/eureka/
      # Feign 走 Eureka 服务发现，不设置 HMDP_VOUCHER/NOTIFY_SERVICE_URL
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      hmdp-registry:
        condition: service_healthy

  hmdp-notify-service:
    build:
      context: ..
      dockerfile: services/hmdp-notify-service/Dockerfile
    container_name: hmdp-notify-service
    ports:
      - "8087:8087"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_SERVICE_URL: http://hmdp-registry:8761/eureka/
    depends_on:
      redis:
        condition: service_healthy
      hmdp-registry:
        condition: service_healthy

  hmdp-job-service:
    build:
      context: ..
      dockerfile: services/hmdp-job-service/Dockerfile
    container_name: hmdp-job-service
    ports:
      - "8088:8088"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_SERVICE_URL: http://hmdp-registry:8761/eureka/
      # Feign 走 Eureka 服务发现，不设置 HMDP_VOUCHER/ORDER_SERVICE_URL
    depends_on:
      redis:
        condition: service_healthy
      hmdp-registry:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  grafana_data:
