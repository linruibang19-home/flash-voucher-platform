global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: hmdp-voucher-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'hmdp-voucher-service:8085' ]

  - job_name: hmdp-order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'hmdp-order-service:8086' ]

  - job_name: hmdp-notify-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'hmdp-notify-service:8087' ]

  - job_name: hmdp-job-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'hmdp-job-service:8088' ]

  - job_name: hmdp-registry
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'hmdp-registry:8761' ]
