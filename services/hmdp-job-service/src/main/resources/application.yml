server:
  port: 8088

spring:
  application:
    name: hmdp-job-service
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      database: 0
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVICE_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# 本地开发可通过此配置覆盖 Feign 服务发现（留空则走 Eureka）
hmdp:
  voucher-service:
    url: ${HMDP_VOUCHER_SERVICE_URL:}
  order-service:
    url: ${HMDP_ORDER_SERVICE_URL:}

prefix:
  distinction:
    name: hmdp

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
