server:
  port: 8083

spring:
  application:
    name: hmdp-shop-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/hmdp?useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true&allowMultiQueries=true&serverTimezone=Asia/Shanghai&autoReconnect=true
    username: root
    password: root
  data:
    redis:
      database: 0
      host: 127.0.0.1
      port: 6379
  jackson:
    default-property-inclusion: non_null
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    generator:
      WRITE_NUMBERS_AS_STRINGS: true

mybatis-plus:
  type-aliases-package: org.javaup.shop.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    local-cache-scope: statement

management:
  endpoints:
    web:
      exposure:
        include: health,info

bloom-filter:
  filters:
    shop:
      name: shop-id-bloom
      expected-insertions: 50000
      false-probability: 0.01
